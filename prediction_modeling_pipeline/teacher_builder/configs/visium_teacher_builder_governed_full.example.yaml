# GitHub example configuration.
# Copy this file to a *.local.yaml file and edit paths before running.
# Local *.local.yaml configs are ignored by Git and should contain machine-specific paths.
# ============================================================
# Config: governed Visium teacher_builder workflow
# ============================================================
#
# Purpose:
#   Configure the governed teacher_builder workflow that builds sample-by-
#   treatment teacher labels for downstream spatial prediction modeling.
#
# Project context:
#   This config controls Steps 01-06 of teacher_builder: input validation,
#   expression teacher scoring, histology teacher scoring, governed fusion,
#   prediction-ready table construction, and final teacher QC.
#
# Scientific role:
#   The governed workflow anchors teacher labels to treatment priors, consumes
#   approved expression_response_model_v2 and histology_response_model_v2
#   artifacts, applies reliability-aware shrinkage, preserves label-quality
#   fields, and writes auditable outputs for spatial response modeling.
#
#
# Important:
#   This documentation pass is intentionally non-behavioral. Comments may be
#   added, but YAML keys and values must remain unchanged.
# ============================================================
# ------------------------------------------------------------
# Project roots
# ------------------------------------------------------------
# project_dir anchors relative paths; pipeline_dir points to the broader prediction pipeline.
project_dir: YOUR_PROJECT_ROOT
# Root for prediction_modeling_pipeline resources.
pipeline_dir: YOUR_PROJECT_ROOT/prediction_modeling_pipeline

# ------------------------------------------------------------
# Visium expression and image inputs
# ------------------------------------------------------------
# These paths identify raw/processed Visium sample folders used by expression and histology teachers.
visium_slides_dir: Visium_samples/visium_cohort_clean
# Raw Visium directory used for image discovery fallback.
raw_visium_dir: Visium_samples/raw_visium_new
# Processed h5ad files are discovered under this directory for expression pseudobulk scoring.
processed_samples_dir: Visium_samples/processed_samples
# Prefer processed h5ad expression over raw-expression fallback.
prefer_processed_h5ad: true
# Raw-expression fallback is disabled for the governed workflow unless explicitly enabled.
allow_raw_expression_fallback: false

# ------------------------------------------------------------
# Run size / smoke-test controls
# ------------------------------------------------------------
# test_mode controls whether the run is a small smoke test or a full cohort run.
test_mode: false
# Number of samples used when test_mode is true. This value is ignored for a full run when test_mode is false.
test_n_samples: 102

# ------------------------------------------------------------
# Spatial feature handoff inputs
# ------------------------------------------------------------
# Step 05 joins governed teacher labels to this numeric spatial feature table.
spatial_feature_table: spatial_feature_identification_pipeline/outputs/output_10_build_model_ready_table/model_input_numeric.csv
# Feature manifest from the spatial feature pipeline; used to describe retained spatial covariates.
spatial_feature_manifest: spatial_feature_identification_pipeline/outputs/output_10_build_model_ready_table/feature_manifest.csv
# Metadata table used for sample descriptors and histology image-path discovery.
metadata_table: spatial_feature_identification_pipeline/outputs/output_03_merge_slide_features/merged_slide_features.csv

# ------------------------------------------------------------
# Histology image preprocessing / scoring controls
# ------------------------------------------------------------
# White/tissue thresholds and image size support histology tile/image handling.
white_threshold: 220
# Minimum tissue fraction used by histology image/tile logic.
min_tissue_fraction: 0.2
# Image size passed to histology model inference.
image_size: 224
# Batch size for histology scoring.
batch_size: 32
# Device selection for histology scoring; auto lets the script decide.
device: auto
# When true, tile-level histology predictions are written for detailed audit.
save_tile_predictions: false
# Filename patterns used to discover high-resolution tissue images.
hires_image_patterns:
- tissue_hires_image.png
- '*tissue_hires_image.png'
- '*tissue_hires_image.png.gz'
- '*hires_image.png'
- '*hires_image.png.gz'
# Duplicate image matches are disallowed unless explicitly enabled.
allow_duplicate_histology_images: false

# ------------------------------------------------------------
# Sample and cohort identifier columns
# ------------------------------------------------------------
# These columns define joins across spatial, metadata, expression, and histology tables.
sample_col: sample_id
# Dataset identifier column used in metadata summaries.
dataset_col: dataset_id
# Cancer-type column used for cohort stratification/provenance.
cancer_col: cancer_type
# Clean Visium slide/image directory used for histology discovery.
slides_dir: Visium_samples/visium_cohort_clean

# ------------------------------------------------------------
# Expression-response model v2 artifacts
# ------------------------------------------------------------
# Step 02 consumes approved deployable expression models rather than retraining expression teachers.
expression_model_v2_root: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/model_training/expression_response_model_v2
# Deployable expression model output root.
expression_model_v2_deployable_root: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/model_training/expression_response_model_v2/outputs/deployable_CH1
# Full expression model index from expression_response_model_v2.
expression_model_index: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/model_training/expression_response_model_v2/outputs/deployable_CH1/model_index.tsv
# Approved expression model index used for teacher scoring.
expression_model_index_approved: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/model_training/expression_response_model_v2/outputs/deployable_CH1/model_index_approved.tsv
# Human-readable expression audit summary for provenance.
expression_audit_summary: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/model_training/expression_response_model_v2/outputs/deployable_CH1/audit/deployable_model_audit_summary.txt
# Expression training data directory used for treatment priors and feature-space context.
expression_training_data_dir: prediction_modeling_pipeline/data_manifests/gdc_expression_training_data
# Expression-response training table used for treatment prior construction and gene feature-space lookup.
expression_training_table: prediction_modeling_pipeline/data_manifests/gdc_expression_training_data/treatment_filtered_outputs/training_table_CH1_tpm_unstranded.tsv

# ------------------------------------------------------------
# Histology-response model v2 artifacts
# ------------------------------------------------------------
# Step 03 uses the audited histology model and compatibility artifacts for image teacher scoring.
histology_model_dir: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/teacher_builder/outputs/_histology_v2_compat
# Histology model audit/index table with approval and reliability metadata.
histology_model_index: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/model_training/histology_response_model_v2/outputs/histology_v2/09_audit/histology_model_index.tsv
# Trained image_treatment checkpoint used by the histology teacher scorer.
histology_model_path: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/model_training/histology_response_model_v2/outputs/histology_v2/07_models/image_treatment/best_model.pt
# Treatment/response encoder file paired with the histology model checkpoint.
histology_encoder_path: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/model_training/histology_response_model_v2/outputs/histology_v2/07_models/encoders.json
# Histology training data directory retained for provenance.
histology_training_data_dir: prediction_modeling_pipeline/data_manifests/gdc_histology_response_discovery

# ------------------------------------------------------------
# Output root and step toggles
# ------------------------------------------------------------
# All governed teacher_builder outputs for this run are written under output_root.
output_root: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/teacher_builder/outputs/teacher_builder_governed_full_20260505_072436
# Archived original governed scorer directory used by the current histology wrapper.
original_teacher_builder_backup_dir: YOUR_PROJECT_ROOT/prediction_modeling_pipeline/teacher_builder/scripts/_backup_governed_20260505_072436
# Toggle for Step 02 expression teacher scoring.
run_expression_teacher: true
# Toggle for Step 03 histology teacher scoring.
run_histology_teacher: true
# Toggle for Step 04 governed fusion.
run_fusion: true
# Toggle for Step 06 QC.
run_qc: true

# ------------------------------------------------------------
# Histology tiling/scoring parameters
# ------------------------------------------------------------
# Image name and tile geometry are retained for compatibility with histology scoring.
hires_image_name: tissue_hires_image.png
# Maximum tiles per slide used by histology scoring.
max_tiles_per_slide: 500
# Tile size in pixels.
tile_size: 256
# Tile stride in pixels.
stride: 256

# ------------------------------------------------------------
# Reproducibility and feature filtering
# ------------------------------------------------------------
# random_state controls deterministic sampling where scripts use randomness.
random_state: 42
# Minimum nonmissing fraction required for spatial features retained in Step 05.
feature_min_nonmissing_fraction: 0.2
# When true, Step 05 removes spatial features with no sample-level variability.
drop_constant_features: true

# ------------------------------------------------------------
# Governed fusion controls
# ------------------------------------------------------------
# These parameters control treatment-prior support, probability clipping, and modality shrinkage.
governance:
  # Minimum treatment-specific observations required before exact prior support is trusted.
  min_exact_prior_n: 5
  # Lower bound for governed teacher probabilities; prevents exact-zero labels.
  probability_clip_low: 0.01
  # Upper bound for governed teacher probabilities; prevents exact-one labels.
  probability_clip_high: 0.99
  # Down-weighting factor applied when histology blank/noise controls raise warnings.
  histology_control_factor_if_warning: 0.5
  # Use calibrated expression probabilities when available.
  use_calibrated_expression_probabilities: true
  # Histology raw probabilities are governed by prior-anchored shrinkage.
  use_histology_raw_then_shrink: true



